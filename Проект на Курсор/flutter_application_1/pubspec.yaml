name: flutter_application_1
description: Premium electronics store MVP — Flutter, Riverpod, go_router.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.18.0
  google_fonts: ^6.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/catalog/imported_products.json
